version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: tms-lab-db
    environment:
      POSTGRES_DB: tms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=16MB
      -c max_connections=100
      -c log_statement=all

  pgadmin:
    image: dpage/pgadmin4
    container_name: tms-lab-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin_data: